<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobertura Personal — Administración Condominio</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#ffffff;
  --bg-secondary:#f5f5f4;
  --bg-tertiary:#efede8;
  --text-primary:#1a1a18;
  --text-secondary:#5f5e5a;
  --text-muted:#888780;
  --border-light:rgba(0,0,0,0.1);
  --border-mid:rgba(0,0,0,0.18);
  --radius-md:8px;
  --radius-lg:12px;
  --blue-bg:#E6F1FB;--blue-text:#0C447C;--blue-border:#185FA5;
  --green-bg:#EAF3DE;--green-text:#3B6D11;
  --amber-bg:#FAEEDA;--amber-text:#633806;--amber-border:#854F0B;
  --red-bg:#FCEBEB;--red-text:#791F1F;--red-border:#A32D2D;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#1e1e1c;
    --bg-secondary:#2a2a28;
    --bg-tertiary:#111110;
    --text-primary:#f0ede8;
    --text-secondary:#b4b2a9;
    --text-muted:#888780;
    --border-light:rgba(255,255,255,0.1);
    --border-mid:rgba(255,255,255,0.18);
    --blue-bg:#042C53;--blue-text:#B5D4F4;--blue-border:#185FA5;
    --green-bg:#173404;--green-text:#C0DD97;
    --amber-bg:#412402;--amber-text:#FAC775;--amber-border:#854F0B;
    --red-bg:#501313;--red-text:#F7C1C1;--red-border:#A32D2D;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-tertiary);color:var(--text-primary);min-height:100vh}
.topbar{background:var(--bg-primary);border-bottom:0.5px solid var(--border-light);padding:0 24px;display:flex;align-items:center;gap:12px;height:52px}
.topbar-title{font-size:15px;font-weight:500;color:var(--text-primary)}
.topbar-sub{font-size:13px;color:var(--text-muted)}
.container{max-width:960px;margin:0 auto;padding:24px 16px}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:600px){.metric-grid{grid-template-columns:repeat(2,1fr)}}
.metric{background:var(--bg-secondary);border-radius:var(--radius-md);padding:14px 16px}
.metric-label{font-size:12px;color:var(--text-secondary);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.metric-value{font-size:24px;font-weight:500;color:var(--text-primary)}
.metric-value.danger{color:#A32D2D}
.metric-value.warning{color:#854F0B}
.metric-value.success{color:#3B6D11}
.tabs{display:flex;gap:2px;border-bottom:0.5px solid var(--border-light);margin-bottom:20px;overflow-x:auto}
.tab{padding:9px 16px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--text-primary)}
.tab.active{color:var(--text-primary);border-bottom:2px solid var(--text-primary);font-weight:500}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section-title{font-size:15px;font-weight:500}
.btn{border:0.5px solid var(--border-mid);border-radius:var(--radius-md);padding:7px 14px;font-size:13px;cursor:pointer;background:var(--bg-primary);color:var(--text-primary);display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg-secondary)}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#0C447C;border-color:#0C447C}
.alert-card{border-radius:var(--radius-lg);border:0.5px solid;padding:12px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.alert-card.danger{background:var(--red-bg);border-color:var(--red-border)}
.alert-card.warning{background:var(--amber-bg);border-color:var(--amber-border)}
.alert-card.info{background:var(--blue-bg);border-color:var(--blue-border)}
.alert-icon{font-size:20px;margin-top:1px}
.alert-card.danger .alert-icon,.alert-card.danger .alert-title{color:var(--red-text)}
.alert-card.warning .alert-icon,.alert-card.warning .alert-title{color:var(--amber-text)}
.alert-card.info .alert-icon,.alert-card.info .alert-title{color:var(--blue-text)}
.alert-title{font-size:13px;font-weight:500;margin-bottom:3px}
.alert-desc{font-size:12px;color:var(--text-secondary)}
.alert-action{margin-left:auto;flex-shrink:0}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.cal-month-label{font-size:15px;font-weight:500;flex:1}
.nav-btn{background:none;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);padding:5px 10px;cursor:pointer;color:var(--text-secondary);font-size:18px;line-height:1;display:flex;align-items:center}
.nav-btn:hover{background:var(--bg-secondary)}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.cal-day-name{text-align:center;font-size:11px;color:var(--text-muted);padding:4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{min-height:72px;border-radius:var(--radius-md);border:0.5px solid var(--border-light);padding:6px;background:var(--bg-primary)}
.cal-day.empty{background:none;border-color:transparent}
.cal-day.today{border:1.5px solid var(--blue-border)}
.cal-day-num{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.cal-day.today .cal-day-num{color:var(--blue-border);font-weight:600}
.pill{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.pill-licencia{background:var(--red-bg);color:var(--red-text)}
.pill-permiso{background:var(--blue-bg);color:var(--blue-text)}
.pill-cubierto{background:var(--green-bg);color:var(--green-text)}
.table-wrap{border:0.5px solid var(--border-light);border-radius:var(--radius-lg);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
th{background:var(--bg-secondary);padding:10px 14px;text-align:left;font-weight:500;font-size:11px;color:var(--text-secondary);border-bottom:0.5px solid var(--border-light);text-transform:uppercase;letter-spacing:.04em}
td{padding:10px 14px;border-bottom:0.5px solid var(--border-light);color:var(--text-primary);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg-secondary)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:3px;font-weight:500}
.badge-permiso{background:var(--blue-bg);color:var(--blue-text)}
.badge-licencia{background:var(--red-bg);color:var(--red-text)}
.badge-cubierto{background:var(--green-bg);color:var(--green-text)}
.badge-pendiente{background:var(--amber-bg);color:var(--amber-text)}
.icon-btn{background:none;border:0.5px solid var(--border-light);border-radius:6px;padding:4px 8px;cursor:pointer;color:var(--text-secondary);font-size:14px;display:inline-flex;align-items:center}
.icon-btn:hover{background:var(--bg-secondary);color:var(--red-text)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-primary);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:400px;border:0.5px solid var(--border-light);max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:500;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--text-secondary);margin-bottom:5px;display:block}
input,select,textarea{width:100%;padding:8px 10px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);font-size:13px;background:var(--bg-primary);color:var(--text-primary);font-family:inherit}
input:focus,select:focus{outline:2px solid var(--blue-border);outline-offset:1px;border-color:var(--blue-border)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--blue-bg);color:var(--blue-text);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-state i{font-size:40px;margin-bottom:12px;display:block}
</style>
</head>
<body>

<div class="topbar">
  <i class="ti ti-building" style="font-size:20px;color:var(--blue-border)" aria-hidden="true"></i>
  <span class="topbar-title">Administración Condominio</span>
  <span class="topbar-sub">· Gestión de cobertura</span>
</div>

<div class="container">

  <div class="metric-grid">
    <div class="metric">
      <div class="metric-label"><i class="ti ti-users" aria-hidden="true"></i> Personal total</div>
      <div class="metric-value" id="m-total">0</div>
    </div>
    <div class="metric">
      <div class="metric-label"><i class="ti ti-calendar-off" aria-hidden="true"></i> Ausentes este mes</div>
      <div class="metric-value warning" id="m-ausentes">0</div>
    </div>
    <div class="metric">
      <div class="metric-label"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Sin cobertura</div>
      <div class="metric-value danger" id="m-sin-cubrir">0</div>
    </div>
    <div class="metric">
      <div class="metric-label"><i class="ti ti-circle-check" aria-hidden="true"></i> Cubiertos</div>
      <div class="metric-value success" id="m-cubiertos">0</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('alertas')"><i class="ti ti-bell" aria-hidden="true"></i> Alertas</button>
    <button class="tab" onclick="switchTab('calendario')"><i class="ti ti-calendar" aria-hidden="true"></i> Calendario</button>
    <button class="tab" onclick="switchTab('ausencias')"><i class="ti ti-list" aria-hidden="true"></i> Ausencias</button>
    <button class="tab" onclick="switchTab('personal')"><i class="ti ti-users" aria-hidden="true"></i> Personal</button>
  </div>

  <div id="tab-alertas">
    <div id="alertas-container"></div>
  </div>

  <div id="tab-calendario" style="display:none">
    <div class="cal-nav">
      <button class="nav-btn" onclick="changeMonth(-1)" aria-label="Mes anterior"><i class="ti ti-chevron-left"></i></button>
      <span class="cal-month-label" id="cal-month-label"></span>
      <button class="nav-btn" onclick="changeMonth(1)" aria-label="Mes siguiente"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="cal-header">
      <div class="cal-day-name">Lun</div><div class="cal-day-name">Mar</div><div class="cal-day-name">Mié</div>
      <div class="cal-day-name">Jue</div><div class="cal-day-name">Vie</div><div class="cal-day-name">Sáb</div>
      <div class="cal-day-name">Dom</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div id="tab-ausencias" style="display:none">
    <div class="section-header">
      <span class="section-title">Registro de ausencias</span>
      <button class="btn btn-primary" onclick="openModal()"><i class="ti ti-plus" aria-hidden="true"></i> Nueva ausencia</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Empleado</th><th>Cargo</th><th>Tipo</th><th>Desde</th><th>Hasta</th><th>Cobertura</th><th></th></tr>
        </thead>
        <tbody id="ausencias-tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-personal" style="display:none">
    <div class="section-header">
      <span class="section-title">Personal del condominio</span>
      <button class="btn btn-primary" onclick="openModalPersonal()"><i class="ti ti-plus" aria-hidden="true"></i> Agregar empleado</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Nombre</th><th>Cargo</th><th>Turno</th><th>Teléfono</th><th></th></tr></thead>
        <tbody id="personal-tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Modal ausencia -->
<div class="modal-overlay" id="modal-ausencia" role="dialog" aria-modal="true" aria-label="Nueva ausencia">
  <div class="modal">
    <div class="modal-title">Registrar ausencia</div>
    <div class="form-group">
      <label class="form-label">Empleado</label>
      <select id="f-empleado"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Tipo</label>
      <select id="f-tipo">
        <option value="permiso">Permiso</option>
        <option value="licencia">Licencia médica</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Fecha inicio</label>
      <input type="date" id="f-inicio">
    </div>
    <div class="form-group">
      <label class="form-label">Fecha término</label>
      <input type="date" id="f-fin">
    </div>
    <div class="form-group">
      <label class="form-label">Reemplazante externo (opcional)</label>
      <input type="text" id="f-reemplazante" placeholder="Nombre o dejar en blanco">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarAusencia()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal personal -->
<div class="modal-overlay" id="modal-personal" role="dialog" aria-modal="true" aria-label="Agregar empleado">
  <div class="modal">
    <div class="modal-title">Agregar empleado</div>
    <div class="form-group">
      <label class="form-label">Nombre completo</label>
      <input type="text" id="p-nombre" placeholder="Ej: Juan Pérez">
    </div>
    <div class="form-group">
      <label class="form-label">Cargo</label>
      <select id="p-cargo">
        <option>Conserje</option>
        <option>Personal de aseo</option>
        <option>Guardia</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Turno</label>
      <select id="p-turno">
        <option>Mañana</option>
        <option>Tarde</option>
        <option>Noche</option>
        <option>Completo</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Teléfono</label>
      <input type="text" id="p-tel" placeholder="+56 9 XXXX XXXX">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModalPersonal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarPersonal()">Guardar</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'condominio_data';
const hoy = new Date();
let calYear = hoy.getFullYear();
let calMonth = hoy.getMonth();

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      personal = d.personal || defaultPersonal();
      ausencias = (d.ausencias || []).map(a => ({
        ...a,
        inicio: new Date(a.inicio),
        fin: new Date(a.fin)
      }));
      nextAusId = ausencias.length ? Math.max(...ausencias.map(a => a.id)) + 1 : 1;
      return;
    }
  } catch(e) {}
  personal = defaultPersonal();
  ausencias = defaultAusencias();
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ personal, ausencias }));
}

function defaultPersonal() {
  return [
    {id:1,nombre:'María González',cargo:'Conserje',turno:'Mañana',tel:'+56 9 8765 4321'},
    {id:2,nombre:'Pedro Soto',cargo:'Personal de aseo',turno:'Completo',tel:'+56 9 7654 3210'},
    {id:3,nombre:'Carmen Rojas',cargo:'Conserje',turno:'Tarde',tel:'+56 9 6543 2109'},
    {id:4,nombre:'Luis Fuentes',cargo:'Personal de aseo',turno:'Mañana',tel:'+56 9 5432 1098'},
    {id:5,nombre:'Ana Muñoz',cargo:'Conserje',turno:'Noche',tel:'+56 9 4321 0987'},
    {id:6,nombre:'Jorge Araya',cargo:'Guardia',turno:'Completo',tel:'+56 9 3210 9876'},
    {id:7,nombre:'Rosa Vega',cargo:'Personal de aseo',turno:'Tarde',tel:'+56 9 2109 8765'},
    {id:8,nombre:'Carlos Mora',cargo:'Guardia',turno:'Noche',tel:'+56 9 1098 7654'}
  ];
}

function defaultAusencias() {
  const y = hoy.getFullYear(), m = hoy.getMonth(), d = hoy.getDate();
  return [
    {id:1,empleadoId:1,tipo:'licencia',inicio:new Date(y,m,d-2),fin:new Date(y,m,d+5),reemplazante:''},
    {id:2,empleadoId:3,tipo:'permiso',inicio:new Date(y,m,d+1),fin:new Date(y,m,d+2),reemplazante:'Silvia Torres'},
    {id:3,empleadoId:4,tipo:'licencia',inicio:new Date(y,m,d),fin:new Date(y,m,d+8),reemplazante:''},
  ];
}

let personal = [], ausencias = [], nextAusId = 1;

function fmtDate(d) {
  return d.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function sameDay(a,b) {
  return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
}
function getEmpById(id) { return personal.find(p=>p.id===id); }
function initials(nombre) {
  return nombre.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
}

function getAusenciasDia(date) {
  return ausencias.filter(a=>{
    const ini=new Date(a.inicio);ini.setHours(0,0,0,0);
    const fin=new Date(a.fin);fin.setHours(23,59,59,999);
    const d=new Date(date);d.setHours(12,0,0,0);
    return d>=ini&&d<=fin;
  });
}

function switchTab(name) {
  ['alertas','calendario','ausencias','personal'].forEach((t,i)=>{
    document.getElementById('tab-'+t).style.display=t===name?'block':'none';
    document.querySelectorAll('.tab')[i].classList.toggle('active',t===name);
  });
  if(name==='calendario')renderCalendar();
  if(name==='ausencias')renderAusencias();
  if(name==='personal')renderPersonal();
}

function updateMetrics() {
  const sinCubrir = ausencias.filter(a=>!a.reemplazante).length;
  const cubiertos = ausencias.filter(a=>a.reemplazante).length;
  document.getElementById('m-total').textContent = personal.length;
  document.getElementById('m-ausentes').textContent = ausencias.length;
  document.getElementById('m-sin-cubrir').textContent = sinCubrir;
  document.getElementById('m-cubiertos').textContent = cubiertos;
}

function renderAlertas() {
  const c = document.getElementById('alertas-container');
  let html = '';
  ausencias.forEach(a=>{
    const emp = getEmpById(a.empleadoId);
    if(!emp) return;
    const ini = new Date(a.inicio); ini.setHours(0,0,0,0);
    const finA = new Date(a.fin); finA.setHours(23,59,59,999);
    const hoyMid = new Date(hoy.getFullYear(),hoy.getMonth(),hoy.getDate());
    const diff = (ini - hoyMid) / (1000*60*60*24);
    if(!a.reemplazante) {
      if(diff<=0 && finA>=hoy) {
        html+=`<div class="alert-card danger">
          <i class="ti ti-alert-circle alert-icon" aria-hidden="true"></i>
          <div style="flex:1">
            <div class="alert-title">Turno activo sin cubrir — ${emp.nombre}</div>
            <div class="alert-desc">${emp.cargo} · Turno ${emp.turno} · ${a.tipo==='licencia'?'Licencia médica':'Permiso'} hasta ${fmtDate(a.fin)}</div>
          </div>
          <button class="btn btn-primary alert-action" style="font-size:12px;padding:5px 12px" onclick="cubrirRapido(${a.id})">
            <i class="ti ti-user-plus" aria-hidden="true"></i> Asignar externo
          </button>
        </div>`;
      } else if(diff>0&&diff<=1) {
        html+=`<div class="alert-card warning">
          <i class="ti ti-bell alert-icon" aria-hidden="true"></i>
          <div style="flex:1">
            <div class="alert-title">Mañana sin cobertura — ${emp.nombre}</div>
            <div class="alert-desc">${emp.cargo} · Turno ${emp.turno} · Inicia ${fmtDate(ini)}</div>
          </div>
          <button class="btn btn-primary alert-action" style="font-size:12px;padding:5px 12px" onclick="cubrirRapido(${a.id})">
            <i class="ti ti-user-plus" aria-hidden="true"></i> Asignar externo
          </button>
        </div>`;
      }
    }
  });
  ausencias.forEach(a=>{
    const emp = getEmpById(a.empleadoId);
    if(!emp||!a.reemplazante) return;
    const finA = new Date(a.fin); finA.setHours(23,59,59,999);
    const ini = new Date(a.inicio); ini.setHours(0,0,0,0);
    const hoyMid = new Date(hoy.getFullYear(),hoy.getMonth(),hoy.getDate());
    if(ini<=hoyMid&&finA>=hoy) {
      html+=`<div class="alert-card info">
        <i class="ti ti-circle-check alert-icon" aria-hidden="true"></i>
        <div>
          <div class="alert-title">Turno cubierto — ${emp.nombre}</div>
          <div class="alert-desc">Reemplazante: <strong>${a.reemplazante}</strong> · Hasta ${fmtDate(a.fin)}</div>
        </div>
      </div>`;
    }
  });
  if(!html) html=`<div class="alert-card info">
    <i class="ti ti-circle-check alert-icon" aria-hidden="true"></i>
    <div><div class="alert-title">Todo en orden</div><div class="alert-desc">No hay ausencias urgentes sin cobertura en este momento.</div></div>
  </div>`;
  c.innerHTML = html;
}

function cubrirRapido(id) {
  const nombre = prompt('Nombre del externo que cubrirá el turno:');
  if(nombre&&nombre.trim()) {
    const a = ausencias.find(x=>x.id===id);
    if(a){ a.reemplazante=nombre.trim(); saveData(); }
    renderAlertas(); updateMetrics();
    if(document.getElementById('tab-ausencias').style.display!=='none') renderAusencias();
  }
}

function renderCalendar() {
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('cal-month-label').textContent=meses[calMonth]+' '+calYear;
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  let startDow=new Date(calYear,calMonth,1).getDay();
  startDow=startDow===0?6:startDow-1;
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  for(let i=0;i<startDow;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(calYear,calMonth,d);
    const div=document.createElement('div');
    div.className='cal-day'+(sameDay(date,hoy)?' today':'');
    const aus=getAusenciasDia(date);
    let h=`<div class="cal-day-num">${d}</div>`;
    aus.forEach(a=>{
      const emp=getEmpById(a.empleadoId);
      const cls=a.reemplazante?'pill-cubierto':(a.tipo==='licencia'?'pill-licencia':'pill-permiso');
      h+=`<span class="pill ${cls}">${emp?emp.nombre.split(' ')[0]:'?'}</span>`;
    });
    div.innerHTML=h;
    grid.appendChild(div);
  }
}

function changeMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  else if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

function renderAusencias(){
  const tb=document.getElementById('ausencias-tbody');
  if(!ausencias.length){
    tb.innerHTML='<tr><td colspan="7"><div class="empty-state"><i class="ti ti-calendar-off"></i>Sin ausencias registradas</div></td></tr>';
    return;
  }
  tb.innerHTML=ausencias.map(a=>{
    const emp=getEmpById(a.empleadoId);
    if(!emp) return '';
    const tipoCls=a.tipo==='licencia'?'badge-licencia':'badge-permiso';
    const tipoLabel=a.tipo==='licencia'?'Licencia médica':'Permiso';
    const cubCls=a.reemplazante?'badge-cubierto':'badge-pendiente';
    const cubLabel=a.reemplazante?a.reemplazante:'Sin cubrir';
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:8px"><div class="avatar">${initials(emp.nombre)}</div>${emp.nombre}</div></td>
      <td>${emp.cargo}</td>
      <td><span class="badge ${tipoCls}">${tipoLabel}</span></td>
      <td>${fmtDate(a.inicio)}</td>
      <td>${fmtDate(a.fin)}</td>
      <td><span class="badge ${cubCls}">${cubLabel}</span></td>
      <td><button class="icon-btn" onclick="eliminarAusencia(${a.id})" aria-label="Eliminar ausencia"><i class="ti ti-trash"></i></button></td>
    </tr>`;
  }).join('');
}

function eliminarAusencia(id){
  if(confirm('¿Eliminar este registro de ausencia?')){
    ausencias=ausencias.filter(a=>a.id!==id);
    saveData(); renderAusencias(); renderAlertas(); updateMetrics();
  }
}

function renderPersonal(){
  const tb=document.getElementById('personal-tbody');
  if(!personal.length){
    tb.innerHTML='<tr><td colspan="5"><div class="empty-state"><i class="ti ti-users"></i>Sin empleados registrados</div></td></tr>';
    return;
  }
  tb.innerHTML=personal.map(p=>`<tr>
    <td><div style="display:flex;align-items:center;gap:8px"><div class="avatar">${initials(p.nombre)}</div>${p.nombre}</div></td>
    <td>${p.cargo}</td>
    <td>${p.turno}</td>
    <td>${p.tel}</td>
    <td><button class="icon-btn" onclick="eliminarPersonal(${p.id})" aria-label="Eliminar empleado"><i class="ti ti-trash"></i></button></td>
  </tr>`).join('');
}

function eliminarPersonal(id){
  if(confirm('¿Eliminar este empleado? También se eliminarán sus ausencias.')){
    personal=personal.filter(p=>p.id!==id);
    ausencias=ausencias.filter(a=>a.empleadoId!==id);
    saveData(); renderPersonal(); renderAlertas(); updateMetrics();
  }
}

function openModal(){
  document.getElementById('f-empleado').innerHTML=personal.map(p=>`<option value="${p.id}">${p.nombre} (${p.cargo})</option>`).join('');
  const hoyStr=hoy.toISOString().split('T')[0];
  document.getElementById('f-inicio').value=hoyStr;
  document.getElementById('f-fin').value=hoyStr;
  document.getElementById('f-reemplazante').value='';
  document.getElementById('modal-ausencia').classList.add('open');
}
function closeModal(){document.getElementById('modal-ausencia').classList.remove('open');}

function guardarAusencia(){
  const empId=parseInt(document.getElementById('f-empleado').value);
  const tipo=document.getElementById('f-tipo').value;
  const inicioStr=document.getElementById('f-inicio').value;
  const finStr=document.getElementById('f-fin').value;
  if(!inicioStr||!finStr){alert('Ingresa las fechas.');return;}
  const ini=new Date(inicioStr+'T12:00:00');
  const fin=new Date(finStr+'T12:00:00');
  if(fin<ini){alert('La fecha de término debe ser igual o posterior al inicio.');return;}
  const reemplazante=document.getElementById('f-reemplazante').value.trim();
  ausencias.push({id:nextAusId++,empleadoId:empId,tipo,inicio:ini,fin,reemplazante});
  saveData(); closeModal(); renderAlertas(); updateMetrics();
  if(document.getElementById('tab-ausencias').style.display!=='none') renderAusencias();
  if(document.getElementById('tab-calendario').style.display!=='none') renderCalendar();
}

function openModalPersonal(){
  ['p-nombre','p-tel'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-personal').classList.add('open');
}
function closeModalPersonal(){document.getElementById('modal-personal').classList.remove('open');}

function guardarPersonal(){
  const nombre=document.getElementById('p-nombre').value.trim();
  if(!nombre){alert('Ingresa el nombre del empleado.');return;}
  const nextId=personal.length?Math.max(...personal.map(p=>p.id))+1:1;
  personal.push({id:nextId,nombre,cargo:document.getElementById('p-cargo').value,turno:document.getElementById('p-turno').value,tel:document.getElementById('p-tel').value.trim()});
  saveData(); closeModalPersonal(); updateMetrics();
  if(document.getElementById('tab-personal').style.display!=='none') renderPersonal();
}

document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el){el.classList.remove('open');}});
});

loadData();
updateMetrics();
renderAlertas();
</script>
</body>
</html>
